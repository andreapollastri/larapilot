id: refactor_service
title: Extract fat controller into a service
category: architecture
difficulty: hard
timeout_s: 900

setup:
  files:
    app/Http/Controllers/OrderController.php: |
      <?php

      namespace App\Http\Controllers;

      use App\Models\User;
      use Illuminate\Http\JsonResponse;
      use Illuminate\Http\Request;
      use Illuminate\Support\Facades\DB;
      use Illuminate\Support\Str;

      class OrderController extends Controller
      {
          public function store(Request $request): JsonResponse
          {
              $data = $request->validate([
                  'user_id' => ['required', 'integer', 'exists:users,id'],
                  'items' => ['required', 'array', 'min:1'],
                  'items.*.sku' => ['required', 'string'],
                  'items.*.qty' => ['required', 'integer', 'min:1'],
                  'items.*.unit_price' => ['required', 'numeric', 'min:0'],
              ]);

              return DB::transaction(function () use ($data) {
                  $total = 0;
                  foreach ($data['items'] as $item) {
                      $total += $item['qty'] * $item['unit_price'];
                  }

                  $orderId = DB::table('orders')->insertGetId([
                      'user_id' => $data['user_id'],
                      'number' => 'ORD-'.Str::upper(Str::random(8)),
                      'total' => $total,
                      'status' => 'pending',
                      'created_at' => now(),
                      'updated_at' => now(),
                  ]);

                  foreach ($data['items'] as $item) {
                      DB::table('order_items')->insert([
                          'order_id' => $orderId,
                          'sku' => $item['sku'],
                          'qty' => $item['qty'],
                          'unit_price' => $item['unit_price'],
                          'created_at' => now(),
                          'updated_at' => now(),
                      ]);
                  }

                  $user = User::query()->findOrFail($data['user_id']);
                  // pretend side-effect
                  $user->forceFill(['remember_token' => Str::random(10)])->save();

                  return response()->json([
                      'id' => $orderId,
                      'total' => $total,
                      'status' => 'pending',
                  ], 201);
              });
          }
      }
    database/migrations/2024_01_01_000010_create_orders_tables.php: |
      <?php

      use Illuminate\Database\Migrations\Migration;
      use Illuminate\Database\Schema\Blueprint;
      use Illuminate\Support\Facades\Schema;

      return new class extends Migration
      {
          public function up(): void
          {
              Schema::create('orders', function (Blueprint $table) {
                  $table->id();
                  $table->foreignId('user_id')->constrained()->cascadeOnDelete();
                  $table->string('number')->unique();
                  $table->decimal('total', 10, 2);
                  $table->string('status');
                  $table->timestamps();
              });

              Schema::create('order_items', function (Blueprint $table) {
                  $table->id();
                  $table->foreignId('order_id')->constrained()->cascadeOnDelete();
                  $table->string('sku');
                  $table->unsignedInteger('qty');
                  $table->decimal('unit_price', 10, 2);
                  $table->timestamps();
              });
          }

          public function down(): void
          {
              Schema::dropIfExists('order_items');
              Schema::dropIfExists('orders');
          }
      }
    routes/web.php: |
      <?php

      use App\Http\Controllers\OrderController;
      use Illuminate\Support\Facades\Route;

      Route::post('/orders', [OrderController::class, 'store']);
    tests/Feature/CreateOrderTest.php: |
      <?php

      use App\Models\User;

      it('creates an order via the service layer', function () {
          $user = User::factory()->create();

          $response = $this->postJson('/orders', [
              'user_id' => $user->id,
              'items' => [
                  ['sku' => 'SKU-1', 'qty' => 2, 'unit_price' => 10.5],
                  ['sku' => 'SKU-2', 'qty' => 1, 'unit_price' => 4],
              ],
          ]);

          $response->assertCreated()
              ->assertJsonPath('total', 25)
              ->assertJsonPath('status', 'pending');

          $this->assertDatabaseHas('orders', [
              'user_id' => $user->id,
              'total' => 25,
              'status' => 'pending',
          ]);

          $this->assertDatabaseCount('order_items', 2);

          expect(class_exists(\App\Services\OrderService::class))->toBeTrue();
      });

prompt: |
  Refactor OrderController@store:

  1. Extract business logic into `App\Services\OrderService` with a clear public method
     (e.g. create(array $data): array|object).
  2. Keep validation in the controller (or a Form Request if you prefer).
  3. Controller should stay thin and return the same JSON contract.
  4. Ensure `php artisan test --filter=CreateOrderTest` passes.

  Do not install packages. Do not commit.

verify:
  - php artisan test --filter=CreateOrderTest

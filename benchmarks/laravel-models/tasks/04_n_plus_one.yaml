id: n_plus_one
title: Fix N+1 with eager loading
category: performance
difficulty: medium
timeout_s: 600

setup:
  # Seed a deliberate N+1 before the agent runs
  files:
    app/Models/Author.php: |
      <?php

      namespace App\Models;

      use Illuminate\Database\Eloquent\Model;
      use Illuminate\Database\Eloquent\Relations\HasMany;

      class Author extends Model
      {
          protected $fillable = ['name'];

          public function books(): HasMany
          {
              return $this->hasMany(Book::class);
          }
      }
    app/Models/Book.php: |
      <?php

      namespace App\Models;

      use Illuminate\Database\Eloquent\Model;
      use Illuminate\Database\Eloquent\Relations\BelongsTo;

      class Book extends Model
      {
          protected $fillable = ['title', 'author_id'];

          public function author(): BelongsTo
          {
              return $this->belongsTo(Author::class);
          }
      }
    app/Http/Controllers/BookController.php: |
      <?php

      namespace App\Http\Controllers;

      use App\Models\Book;
      use Illuminate\Http\JsonResponse;

      class BookController extends Controller
      {
          public function index(): JsonResponse
          {
              // Intentional N+1 — fix this.
              $books = Book::query()->get()->map(fn (Book $book) => [
                  'id' => $book->id,
                  'title' => $book->title,
                  'author' => $book->author->name,
              ]);

              return response()->json($books);
          }
      }
    database/migrations/2024_01_01_000001_create_authors_and_books_tables.php: |
      <?php

      use Illuminate\Database\Migrations\Migration;
      use Illuminate\Database\Schema\Blueprint;
      use Illuminate\Support\Facades\Schema;

      return new class extends Migration
      {
          public function up(): void
          {
              Schema::create('authors', function (Blueprint $table) {
                  $table->id();
                  $table->string('name');
                  $table->timestamps();
              });

              Schema::create('books', function (Blueprint $table) {
                  $table->id();
                  $table->foreignId('author_id')->constrained()->cascadeOnDelete();
                  $table->string('title');
                  $table->timestamps();
              });
          }

          public function down(): void
          {
              Schema::dropIfExists('books');
              Schema::dropIfExists('authors');
          }
      }
    routes/web.php: |
      <?php

      use App\Http\Controllers\BookController;
      use Illuminate\Support\Facades\Route;

      Route::get('/books', [BookController::class, 'index']);
    tests/Feature/BooksIndexQueryTest.php: |
      <?php

      use App\Models\Author;
      use App\Models\Book;
      use Illuminate\Support\Facades\DB;

      it('eager loads authors and avoids N+1', function () {
          $authors = Author::factory()->count(3)->create();
          foreach ($authors as $author) {
              Book::factory()->count(2)->create(['author_id' => $author->id]);
          }

          DB::flushQueryLog();
          DB::enableQueryLog();

          $this->getJson('/books')->assertOk();

          $selects = collect(DB::getQueryLog())
              ->pluck('query')
              ->filter(fn ($q) => str_starts_with(strtolower($q), 'select'));

          // 1 books + 1 authors (eager) — not 1 + N
          expect($selects->count())->toBeLessThanOrEqual(3);
      });

prompt: |
  There is an N+1 query bug in BookController@index.

  Fix it with eager loading (with('author') or equivalent). Keep the JSON shape identical.
  Also add missing factories for Author and Book if the test needs them so
  `php artisan test --filter=BooksIndexQueryTest` passes.

  Do not install packages. Do not commit.

verify:
  - php artisan test --filter=BooksIndexQueryTest

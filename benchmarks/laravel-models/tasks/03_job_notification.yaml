id: job_mail
title: Queued job that sends a mailable
category: queue
difficulty: medium
timeout_s: 720

prompt: |
  You are working in a fresh Laravel app. Implement ONLY what is asked.

  1. Create mailable `App\Mail\WelcomeUserMail` with a simple markdown/blade view
     accepting a User model (use the default User).
  2. Create queued job `App\Jobs\SendWelcomeMail` that sends WelcomeUserMail to the user.
  3. Pest test `tests/Feature/SendWelcomeMailTest.php` that:
     - fakes Mail / Queue as appropriate
     - asserts the job sends the mailable (or that dispatching the job queues it and
       handling it sends the mail — pick one clear approach and stick to it)

  Prefer Laravel conventions. Do not install packages. Do not commit.

verify:
  - php artisan test --filter=SendWelcomeMailTest

id: eloquent_scope
title: Eloquent local scope + query
category: eloquent
difficulty: easy
timeout_s: 600

prompt: |
  You are working in a fresh Laravel app. Implement ONLY what is asked.

  1. Create model `App\Models\Post` with fillable: title, body, published_at, status.
  2. Add a local scope `published()` that returns posts where status = 'published'
     AND published_at is not null and <= now().
  3. Create Pest feature test `tests/Feature/PostScopeTest.php` that:
     - creates one published post and one draft
     - asserts Post::published()->count() === 1

  Use PHPUnit/Pest factories if helpful. Do not install packages. Do not commit.
  When done, summarize the files you changed in 3 bullets.

verify:
  - php artisan test --filter=PostScopeTest

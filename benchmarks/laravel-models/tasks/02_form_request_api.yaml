id: form_request_api
title: Form Request + JSON API endpoint
category: http
difficulty: medium
timeout_s: 720

prompt: |
  You are working in a fresh Laravel app. Implement ONLY what is asked.

  1. Create `App\Http\Requests\StoreWidgetRequest` validating:
     - name: required, string, max:100
     - sku: required, string, unique:widgets,sku
     - price: required, numeric, min:0
  2. Create migration + model `Widget` (table widgets: name, sku unique, price decimal 10,2, timestamps).
  3. Create `WidgetController@store` that validates via StoreWidgetRequest and returns 201 JSON of the widget.
  4. Register POST /api/widgets in routes/api.php (bootstrap api routes if needed).
  5. Pest feature test `tests/Feature/StoreWidgetTest.php`:
     - happy path 201
     - missing name -> 422

  Do not install packages. Do not commit. Summarize changed files briefly when done.

verify:
  - php artisan test --filter=StoreWidgetTest

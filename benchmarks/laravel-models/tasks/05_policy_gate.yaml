id: policy_gate
title: Policy + authorization on update
category: auth
difficulty: medium
timeout_s: 720

prompt: |
  You are working in a fresh Laravel app. Implement ONLY what is asked.

  1. Create model `Document` (user_id, title, body) + migration.
  2. Create `DocumentPolicy` with `update` allowing only the owning user.
  3. Create controller method that updates title/body and authorizes via the policy
     (Gate/Policy — Laravel style). Route: PATCH /documents/{document}
  4. Pest tests in `tests/Feature/DocumentPolicyTest.php`:
     - owner can update (200/204/ok)
     - other user gets 403

  Use the default User model. Do not install packages. Do not commit.

verify:
  - php artisan test --filter=DocumentPolicyTest

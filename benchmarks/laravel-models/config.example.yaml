# Copy to config.yaml and adjust.
# Models: run `python run.py list-models` to see IDs available on your account.

api_key_env: CURSOR_API_KEY

models:
  - composer-2.5
  - claude-4.6-sonnet-medium-thinking
  - claude-opus-4-8-thinking-high
  - gpt-5.4-medium
  - cursor-grok-4.5-high-fast

# Optional per-model params (from Cursor.models.list())
# model_params:
#   composer-2.5:
#     - { id: fast, value: "true" }

tasks_glob: tasks/*.yaml

# Fresh Laravel app used as the base for every model×task run
fixture:
  # If missing, `prepare-fixture` creates it via composer
  path: fixtures/laravel-app
  laravel_version: "^12.0"

work_root: .work  # isolated copies; safe to delete

# Run models sequentially (safer for local disk / rate limits).
# Set true only if you know your machine + API quota can handle it.
parallel_models: false

# Keep workdirs after a run for manual inspection
keep_workdirs: true

scoring:
  # Weighted score used in the article leaderboard
  weights:
    pass: 50          # verify commands all green
    speed: 20         # inverse of duration among finishers of same task
    tokens: 15        # inverse of total_tokens among finishers of same task
    cleanliness: 15   # fewer changed files / quieter diff among finishers

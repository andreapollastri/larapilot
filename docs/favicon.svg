<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Larapilot">
  <rect width="32" height="32" rx="7" fill="#1C1412"/>
  <!-- antenna -->
  <circle cx="16" cy="5.5" r="1.6" fill="#FF8F7A"/>
  <path d="M16 7.2v2.3" stroke="#FF8F7A" stroke-width="1.6" stroke-linecap="round"/>
  <!-- ear bolts -->
  <rect x="5" y="14.2" width="2.8" height="5.2" rx="1.2" fill="#FF8F7A"/>
  <rect x="24.2" y="14.2" width="2.8" height="5.2" rx="1.2" fill="#FF8F7A"/>
  <!-- head -->
  <rect x="7.5" y="9.5" width="17" height="15.5" rx="3.5" fill="#FF8F7A"/>
  <!-- eyes -->
  <circle cx="12.6" cy="15.4" r="2" fill="#1C1412"/>
  <circle cx="19.4" cy="15.4" r="2" fill="#1C1412"/>
  <circle cx="13.2" cy="14.9" r="0.55" fill="#FF8F7A"/>
  <circle cx="20" cy="14.9" r="0.55" fill="#FF8F7A"/>
  <!-- mouth -->
  <rect x="12.2" y="20.2" width="7.6" height="1.7" rx="0.85" fill="#1C1412"/>
  <!-- chin plate -->
  <path d="M11 25h10" stroke="#1C1412" stroke-width="1.4" stroke-linecap="round" opacity=".35"/>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Form wizard — Filament</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700" rel="stylesheet">
  <link rel="stylesheet" href="../tokens.css">
</head>
<body class="fi-mockup">
  <div class="fi-layout">
    <aside class="fi-sidebar" aria-label="Main navigation">
      <div class="fi-sidebar__brand">Filament Demo</div>
      <nav class="fi-sidebar__nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="resource-list.html" class="is-active">Users</a>
      </nav>
    </aside>
    <div class="fi-main">
      <header class="fi-topbar">
        <div class="fi-topbar__spacer"></div>
        <div class="fi-topbar__avatar" aria-hidden="true">JD</div>
      </header>
      <main class="fi-content">
        <header class="fi-page-header">
          <h1>Onboard user</h1>
          <p>Multi-step wizard — UI Kit (Free).</p>
        </header>
        <nav class="fi-wizard-steps" aria-label="Wizard progress">
          <div class="fi-wizard-step is-done"><span class="fi-wizard-step__num">✓</span> Profile</div>
          <div class="fi-wizard-step is-active"><span class="fi-wizard-step__num">2</span> Permissions</div>
          <div class="fi-wizard-step"><span class="fi-wizard-step__num">3</span> Review</div>
        </nav>
        <form action="#" method="post">
          <section class="fi-section">
            <h2 class="fi-section__heading">Permissions</h2>
            <div class="fi-field">
              <label for="role">Role</label>
              <select id="role" name="role">
                <option>Admin</option>
                <option selected>Editor</option>
                <option>Viewer</option>
              </select>
            </div>
            <div class="fi-field fi-checkbox">
              <input id="can_export" type="checkbox" checked>
              <label for="can_export">Can export data</label>
            </div>
            <div class="fi-field">
              <span id="toggle-label">Two-factor required</span>
              <div style="margin-top:0.5rem">
                <button type="button" class="fi-toggle is-on" aria-labelledby="toggle-label" aria-pressed="true"></button>
              </div>
            </div>
          </section>
          <div class="fi-actions-bar">
            <button type="button" class="fi-btn fi-btn--secondary">Back</button>
            <div class="fi-actions-bar__spacer"></div>
            <button type="submit" class="fi-btn fi-btn--primary">Continue</button>
          </div>
        </form>
      </main>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Settings — Filament</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700" rel="stylesheet">
  <link rel="stylesheet" href="../tokens.css">
</head>
<body class="fi-mockup">
  <div class="fi-layout">
    <aside class="fi-sidebar" aria-label="Main navigation">
      <div class="fi-sidebar__brand">Filament Demo</div>
      <nav class="fi-sidebar__nav">
        <a href="dashboard.html">Dashboard</a>
        <div class="fi-nav-group__label">Catalog</div>
        <a href="resource-list.html">Users</a>
        <a href="resource-list.html">Orders</a>
        <div class="fi-nav-group__label">System</div>
        <a href="settings.html" class="is-active" aria-current="page">Settings</a>
      </nav>
    </aside>
    <div class="fi-main">
      <header class="fi-topbar">
        <div class="fi-topbar__spacer"></div>
        <div class="fi-topbar__avatar" aria-hidden="true">JD</div>
      </header>
      <main class="fi-content">
        <header class="fi-page-header">
          <h1>Settings</h1>
          <p>Manage application preferences.</p>
        </header>
        <nav class="fi-tabs" aria-label="Settings sections">
          <a href="#" class="is-active" aria-current="page">General</a>
          <a href="#">Notifications</a>
          <a href="#">Billing</a>
        </nav>
        <form action="#" method="post">
          <section class="fi-section">
            <h2 class="fi-section__heading">General</h2>
            <div class="fi-form-grid">
              <div class="fi-field fi-field--full">
                <label for="app_name">Application name</label>
                <input id="app_name" name="app_name" type="text" value="Filament Demo">
              </div>
              <div class="fi-field">
                <label for="timezone">Timezone</label>
                <select id="timezone" name="timezone">
                  <option selected>Europe/Rome</option>
                  <option>UTC</option>
                  <option>America/New_York</option>
                </select>
              </div>
              <div class="fi-field">
                <label for="locale">Locale</label>
                <select id="locale" name="locale">
                  <option selected>Italian</option>
                  <option>English</option>
                </select>
              </div>
              <div class="fi-field fi-field--full fi-checkbox">
                <input id="maintenance" name="maintenance" type="checkbox">
                <label for="maintenance">Enable maintenance mode</label>
              </div>
            </div>
          </section>
          <div class="fi-actions-bar">
            <div class="fi-actions-bar__spacer"></div>
            <button type="submit" class="fi-btn fi-btn--primary">Save settings</button>
          </div>
        </form>
      </main>
    </div>
  </div>
</body>
</html>

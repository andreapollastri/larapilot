<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Bootstrap 5</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../tokens.css">
</head>
<body class="bs-mockup d-flex align-items-center min-vh-100 bg-body-tertiary">
  <main class="container" style="max-width: 24rem">
    <div class="text-center mb-4">
      <a href="landing.html" class="text-decoration-none fw-bold fs-5 text-primary">Acme SaaS</a>
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 text-center mb-1">Sign in</h1>
        <p class="text-secondary text-center small mb-4">Enter your credentials to continue.</p>
        <form>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" required>
          </div>
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="remember">
            <label class="form-check-label" for="remember">Remember me</label>
          </div>
          <button type="submit" class="btn btn-primary w-100">Log in</button>
        </form>
        <p class="text-center small text-secondary mt-3 mb-0">
          <a href="#">Forgot password?</a> · <a href="landing.html">Back to site</a>
        </p>
      </div>
    </div>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Settings — Bootstrap 5</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../tokens.css">
</head>
<body class="bs-mockup">
  <div class="bs-app">
    <aside class="bs-sidebar" aria-label="Sidebar">
      <div class="bs-sidebar__header">
        <a href="dashboard.html" class="bs-sidebar__brand">Acme Admin</a>
      </div>
      <nav class="bs-sidebar__nav nav flex-column">
        <a class="nav-link" href="dashboard.html">Dashboard</a>
        <a class="nav-link active" href="settings.html" aria-current="page">Settings</a>
      </nav>
    </aside>

    <div class="bs-main">
      <header class="bs-topbar">
        <nav aria-label="Breadcrumb">
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a href="dashboard.html">Dashboard</a></li>
            <li class="breadcrumb-item active" aria-current="page">Settings</li>
          </ol>
        </nav>
      </header>

      <main class="bs-content">
        <div class="mb-4">
          <h1 class="h3 mb-1">Profile settings</h1>
          <p class="text-secondary mb-0">Update your account information.</p>
        </div>

        <div class="card mb-4" style="max-width: 36rem">
          <div class="card-body">
            <h2 class="h6 mb-3">Personal details</h2>
            <form>
              <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" value="Jane Doe">
              </div>
              <div class="mb-3">
                <label for="settings-email" class="form-label">Email</label>
                <input type="email" class="form-control" id="settings-email" value="jane@example.com">
              </div>
              <button type="submit" class="btn btn-primary">Save changes</button>
            </form>
          </div>
        </div>

        <div class="card border-danger" style="max-width: 36rem">
          <div class="card-body">
            <h2 class="h6 text-danger mb-2">Danger zone</h2>
            <p class="text-secondary small mb-3">Permanently delete your account and all associated data.</p>
            <button type="button" class="btn btn-outline-danger btn-sm">Delete account</button>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Components — Bootstrap 5</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../tokens.css">
</head>
<body class="bs-mockup">
  <main class="bs-gallery container">
    <h1 class="mb-2">Components</h1>
    <p class="bs-gallery__intro">Bootstrap 5.3 primitives for static mockups. <a href="index.html">← Back to catalog</a></p>

    <section class="card mb-4">
      <div class="card-body">
        <h2 class="h6 mb-3">Buttons</h2>
        <div class="d-flex flex-wrap gap-2">
          <button type="button" class="btn btn-primary">Primary</button>
          <button type="button" class="btn btn-secondary">Secondary</button>
          <button type="button" class="btn btn-outline-primary">Outline</button>
          <button type="button" class="btn btn-danger">Danger</button>
          <button type="button" class="btn btn-link">Link</button>
        </div>
      </div>
    </section>

    <section class="card mb-4">
      <div class="card-body">
        <h2 class="h6 mb-3">Alerts & badges</h2>
        <div class="alert alert-success" role="alert">Changes saved successfully.</div>
        <div class="alert alert-warning" role="alert">Your trial ends in 3 days.</div>
        <div class="d-flex flex-wrap gap-2">
          <span class="badge text-bg-primary">Primary</span>
          <span class="badge text-bg-success">Success</span>
          <span class="badge text-bg-warning">Warning</span>
          <span class="badge text-bg-danger">Danger</span>
        </div>
      </div>
    </section>

    <section class="card mb-4">
      <div class="card-body">
        <h2 class="h6 mb-3">Form</h2>
        <div class="mb-3">
          <label for="demo-input" class="form-label">Email</label>
          <input type="email" class="form-control" id="demo-input" placeholder="you@example.com">
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="demo-check">
          <label class="form-check-label" for="demo-check">Accept terms</label>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-body">
        <h2 class="h6 mb-3">Modal trigger</h2>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#demoModal">Open modal</button>
      </div>
    </section>
  </main>

  <div class="modal fade" id="demoModal" tabindex="-1" aria-labelledby="demoModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title fs-5" id="demoModalLabel">Confirm action</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">Are you sure you want to proceed? This action cannot be undone.</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

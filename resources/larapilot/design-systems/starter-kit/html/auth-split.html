<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auth (split) — Laravel Starter Kit</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=instrument-sans:400,500,600,700" rel="stylesheet">
  <link rel="stylesheet" href="../tokens.css">
</head>
<body class="sk-mockup">
  <div class="sk-auth-split">
    <div class="sk-auth-split__brand">
      <h2>Laravel</h2>
      <p style="margin:0;opacity:0.85;max-width:20rem">Build something great with the official starter kits — auth, dashboard, and settings included.</p>
    </div>
    <div class="sk-auth-split__form">
      <div class="sk-auth-card">
        <h1>Log in to your account</h1>
        <p class="sk-auth-card__desc">Enter your email and password below to log in</p>
        <form action="#" method="post">
          <div class="sk-field">
            <label for="email">Email address</label>
            <input id="email" name="email" type="email" class="sk-input" autocomplete="username" required>
          </div>
          <div class="sk-field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" class="sk-input" autocomplete="current-password" required>
          </div>
          <button type="submit" class="sk-btn sk-btn--primary sk-btn--block">Log in</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>

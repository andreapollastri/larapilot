<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Header layout — Laravel Starter Kit</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=instrument-sans:400,500,600,700" rel="stylesheet">
  <link rel="stylesheet" href="../tokens.css">
</head>
<body class="sk-mockup">
  <div class="sk-header-layout">
    <header class="sk-header-nav">
      <a href="dashboard.html" class="sk-sidebar__logo">
        <span class="sk-sidebar__logo-mark" aria-hidden="true">L</span>
        Laravel
      </a>
      <nav class="sk-header-nav__links" aria-label="Main navigation">
        <a href="header-layout.html" class="is-active" aria-current="page">Dashboard</a>
        <a href="settings.html">Settings</a>
      </nav>
      <button type="button" class="sk-sidebar__user" style="width:auto;margin-left:0.5rem" aria-haspopup="menu">
        <span class="sk-sidebar__avatar" aria-hidden="true">JD</span>
        <span class="sk-sidebar__user-name">Jane Doe</span>
      </button>
    </header>
    <main class="sk-header-content">
      <div class="sk-placeholder" aria-label="Dashboard content placeholder"></div>
    </main>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Components — Laravel Starter Kit</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=instrument-sans:400,500,600,700" rel="stylesheet">
  <link rel="stylesheet" href="../tokens.css">
</head>
<body class="sk-mockup">
  <main class="sk-gallery">
    <h1>Components</h1>
    <p class="sk-gallery__intro">shadcn / Flux primitives approximated for static mockups. <a href="index.html">← Back to catalog</a></p>

    <section class="sk-card" style="margin-bottom:1rem">
      <h2 class="sk-card__title">Buttons</h2>
      <div class="sk-component-grid">
        <button type="button" class="sk-btn sk-btn--primary">Primary</button>
        <button type="button" class="sk-btn sk-btn--outline">Outline</button>
        <button type="button" class="sk-btn sk-btn--ghost">Ghost</button>
        <button type="button" class="sk-btn sk-btn--destructive">Destructive</button>
        <button type="button" class="sk-btn sk-btn--link">Link</button>
      </div>
    </section>

    <section class="sk-card" style="margin-bottom:1rem">
      <h2 class="sk-card__title">Inputs</h2>
      <div class="sk-field">
        <label for="demo-email">Email</label>
        <input id="demo-email" type="email" class="sk-input" placeholder="you@example.com">
      </div>
      <div class="sk-checkbox">
        <input id="demo-check" type="checkbox">
        <label for="demo-check">Remember me</label>
      </div>
    </section>

    <section class="sk-card" style="margin-bottom:1rem">
      <h2 class="sk-card__title">Badges</h2>
      <div class="sk-component-grid">
        <span class="sk-badge">Default</span>
        <span class="sk-badge sk-badge--destructive">Destructive</span>
      </div>
    </section>

    <section class="sk-card">
      <h2 class="sk-card__title">Card + placeholder</h2>
      <p class="sk-card__desc">Dashboard empty state pattern from the official kits.</p>
      <div class="sk-placeholder" style="min-height:8rem" aria-hidden="true"></div>
    </section>
  </main>
</body>
</html>

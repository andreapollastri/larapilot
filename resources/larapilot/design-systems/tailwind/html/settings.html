<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Settings — Tailwind CSS</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] } } } }
  </script>
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-900 antialiased">
  <div class="flex min-h-screen">
    <aside class="hidden w-64 shrink-0 flex-col border-r border-slate-200 bg-white md:flex" aria-label="Sidebar">
      <div class="flex h-14 items-center border-b border-slate-200 px-5">
        <a href="dashboard.html" class="font-semibold text-slate-900">Nordic Flow</a>
      </div>
      <nav class="flex flex-1 flex-col gap-1 p-3">
        <a href="dashboard.html" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900">Dashboard</a>
        <a href="settings.html" class="rounded-lg bg-indigo-50 px-3 py-2 text-sm font-medium text-indigo-700" aria-current="page">Settings</a>
      </nav>
    </aside>

    <div class="flex min-w-0 flex-1 flex-col">
      <header class="sticky top-0 z-10 flex h-14 items-center gap-3 border-b border-slate-200 bg-white px-4 shadow-sm sm:px-6">
        <button type="button" class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-slate-300 md:hidden" aria-label="Open menu">☰</button>
        <nav aria-label="Breadcrumb" class="text-sm text-slate-500">
          <a href="dashboard.html" class="hover:text-slate-700">Dashboard</a>
          <span class="mx-1.5 text-slate-300">/</span>
          <span class="font-medium text-slate-900">Settings</span>
        </nav>
      </header>

      <main class="flex-1 p-4 sm:p-6">
        <div class="mb-6">
          <h1 class="text-2xl font-bold">Profile settings</h1>
          <p class="text-slate-600">Update your account information.</p>
        </div>

        <section class="mb-6 max-w-xl rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
          <h2 class="mb-4 font-semibold">Personal details</h2>
          <form class="space-y-4">
            <div>
              <label for="name" class="mb-1 block text-sm font-medium">Name</label>
              <input id="name" type="text" value="Jane Doe" class="block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            </div>
            <div>
              <label for="settings-email" class="mb-1 block text-sm font-medium">Email</label>
              <input id="settings-email" type="email" value="jane@example.com" class="block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            </div>
            <button type="submit" class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">Save changes</button>
          </form>
        </section>

        <section class="max-w-xl rounded-xl border border-red-200 bg-white p-6 shadow-sm">
          <h2 class="mb-2 font-semibold text-red-600">Danger zone</h2>
          <p class="mb-4 text-sm text-slate-600">Permanently delete your account and all associated data.</p>
          <button type="button" class="rounded-lg border border-red-300 px-3 py-1.5 text-sm font-medium text-red-600 hover:bg-red-50 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-red-600">Delete account</button>
        </section>
      </main>
    </div>
  </div>
</body>
</html>
